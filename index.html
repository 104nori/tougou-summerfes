<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>東郷夏祭り 交通整理</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a2035;--navy2:#253150;--accent:#e8a020;--acc2:#ffc94d;
  --red:#e03c3c;--green:#2eb87a;--blue:#3d5a99;--bg:#f0f3f8;
  --text:#1a2035;--muted:#6b7a99;--border:#d4dbe8;
  --p1b:#e03c3c;--p2b:#e8a020;--p3b:#3d82b8;
  --HH:52px;--NH:56px;
}
html,body{height:100%;overflow:hidden;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:var(--text);background:var(--bg)}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--HH);
  background:var(--navy);border-bottom:3px solid var(--accent);
  display:flex;align-items:center;gap:8px;padding:0 12px}
.logo{font-size:15px;font-weight:800;color:white;white-space:nowrap}
.hbtns{display:flex;gap:4px;margin-left:8px}
@media(max-width:767px){
  .hbtns .hbtn:not(#btn-add-pin){display:none}
  #btn-add-pin{display:flex}
}
.hbtn{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.2);
  border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  white-space:nowrap;transition:all .15s}
.hbtn:hover{background:rgba(255,255,255,.22)}
.hbtn.on{background:var(--accent);color:var(--navy);border-color:var(--accent)}

/* SLIDE PANEL */
#slide-panel{
  position:fixed;top:var(--HH);right:0;bottom:0;z-index:400;
  width:360px;max-width:100vw;
  background:white;border-left:1px solid var(--border);
  display:none;flex-direction:column;
  box-shadow:-4px 0 20px rgba(0,0,0,.15);
}
#slide-panel.show{display:flex}
@media(max-width:767px){
  #slide-panel{width:100%;border-left:none;
    top:auto;bottom:var(--NH);
    height:75vh;border-radius:16px 16px 0 0;
    border-top:1px solid var(--border);
    box-shadow:0 -4px 20px rgba(0,0,0,.15);
  }
}
.panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.logo b{color:var(--accent)}
.hstats{display:flex;gap:4px;margin-left:auto}
.hchip{border-radius:6px;padding:3px 7px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px}
.hchip strong{font-size:14px}
.c1{background:rgba(224,60,60,.25);color:#ffb3b3}.c1 strong{color:#ff8f8f}
.c2{background:rgba(232,160,32,.25);color:#ffd980}.c2 strong{color:var(--acc2)}
.c3{background:rgba(61,90,153,.35);color:#aac4f0}.c3 strong{color:#90b8ff}
.syncdot{width:7px;height:7px;border-radius:50%;background:#9fb3cc;flex-shrink:0}
.synctxt{font-size:10px;color:#9fb3cc;white-space:nowrap}

/* LAYOUT */
.wrap{position:fixed;top:var(--HH);left:0;right:0;bottom:var(--NH);display:flex;overflow:hidden}
#map{flex:1;min-height:0}

/* MAP BAR */
.mapbar{flex-shrink:0;z-index:30;background:white;
  border-bottom:1px solid var(--border);padding:7px 10px;display:flex;align-items:center;gap:8px}
.mapbar-hint{flex:1;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mapbar-hint.ok{color:var(--green);font-weight:700}
.btn-fab{background:var(--accent);color:var(--navy);border:none;border-radius:8px;
  padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn-fab:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.btn-tog{background:white;border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-tog.on{background:var(--blue);color:white;border-color:var(--blue)}

/* PIN PANEL (bottom of map) */
#pin-panel{display:none;position:absolute;bottom:0;left:0;right:0;z-index:20;
  background:white;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.2);
  padding:12px 16px 20px;max-height:55vh;overflow-y:auto}
#pin-panel-body{font-size:13px;line-height:1.8}
.pp-row{margin-bottom:3px}
.pp-row b{color:var(--red)}
.pp-row .ok{color:var(--green)}
.pp-actions{display:flex;gap:8px;margin-top:12px}
.pp-btn{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.pp-edit{background:var(--blue);color:white}
.pp-del{background:#ffeaea;color:var(--red)}
.pp-close{flex:0;padding:11px 14px;background:var(--bg);color:var(--muted);border:none;border-radius:10px;cursor:pointer;font-family:inherit}

/* SIDEBAR (desktop) */
.sidebar{width:340px;background:white;border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.stabs{display:flex;background:var(--navy2);flex-shrink:0}
.stab{flex:1;padding:10px;border:none;background:none;color:#9fb3cc;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  border-bottom:3px solid transparent;transition:all .15s}
.stab.on{color:white;border-bottom-color:var(--accent)}

/* FORM */
.form-area{overflow-y:auto;padding:10px 12px;flex-shrink:0;background:#f7f9fc;border-bottom:2px solid var(--border);max-height:52vh}
.fh{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px}
.sf{margin-bottom:9px}
.sf>label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sf input,.sf textarea,.sf select{width:100%;border:1.5px solid var(--border);border-radius:8px;
  padding:7px 10px;font-size:13px;font-family:inherit;background:white;color:var(--text)}
.sf input:focus,.sf textarea:focus,.sf select:focus{outline:none;border-color:var(--blue)}
.sf textarea{resize:none;height:52px}
.prow{display:flex;gap:5px}
.pr{display:none}.pr+label{flex:1;padding:6px 3px;border-radius:8px;border:2px solid var(--border);
  cursor:pointer;font-size:11px;font-weight:800;text-align:center;line-height:1.4;background:white;color:var(--muted);user-select:none}
#dp1:checked+label{background:#fff0f0;border-color:var(--p1b);color:#b52020}
#dp2:checked+label{background:#fff8e6;border-color:var(--p2b);color:#8a5e00}
#dp3:checked+label{background:#f0f8ff;border-color:var(--p3b);color:#1a5280}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.to{display:none}.to+label{display:flex;align-items:center;justify-content:center;gap:4px;
  padding:7px 5px;border-radius:8px;border:2px solid var(--border);cursor:pointer;
  font-size:11px;font-weight:700;background:white;color:var(--muted);user-select:none;text-align:center;line-height:1.3}
.to:checked+label{background:#fff0f0;border-color:var(--red);color:#b52020}
.fgrid{display:grid;grid-template-areas:'. N .' 'W C E' '. S .';gap:4px;width:108px}
.fr{display:none}.fr+label{display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border:2px solid var(--border);border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:800;background:white;color:var(--muted);user-select:none}
.fr:checked+label{background:var(--blue);border-color:var(--blue);color:white}
.fN{grid-area:N}.fW{grid-area:W}.fE{grid-area:E}.fS{grid-area:S}
.fC{grid-area:C;display:flex;align-items:center;justify-content:center;font-size:16px}
.crow{display:flex;gap:6px;flex-wrap:wrap}
.co{display:none}.co+label{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.co:checked+label{border-color:var(--navy);transform:scale(1.2)}
.btn-save{width:100%;background:var(--accent);color:var(--navy);border:none;border-radius:10px;
  padding:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px}
.btn-save:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.form-hint{font-size:10px;color:var(--blue);text-align:center;margin-top:4px}
.form-hint.ok{color:var(--green);font-weight:700}

/* SEG MANAGER */
.seg-mgr{padding:8px 12px;background:#f7f9fc;border-bottom:1px solid var(--border);flex-shrink:0}
.seg-mgr h4{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.seg-items{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;max-height:80px;overflow-y:auto}
.seg-item{display:flex;align-items:center;gap:6px;font-size:12px}
.seg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.seg-item-name{flex:1;font-weight:700}
.seg-del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;line-height:1}
.seg-add{display:flex;gap:5px}
.seg-add input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-family:inherit}
.seg-add input:focus{outline:none;border-color:var(--blue)}
.seg-add button{background:var(--blue);color:white;border:none;border-radius:7px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit}

/* FILTER BAR */
.fbar{display:flex;background:white;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ftab{flex:1;min-width:50px;padding:8px 3px;font-size:11px;font-weight:700;text-align:center;
  cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:3px solid transparent;font-family:inherit}
.ftab.on{color:var(--text);border-bottom-color:var(--blue)}
.ftab .cnt{display:inline-block;background:var(--border);border-radius:10px;padding:0 4px;margin-left:2px;font-size:10px}
.ftab.on .cnt{background:var(--blue);color:white}

/* PIN LIST */
.pin-list{flex:1;overflow-y:auto;padding:8px 10px 16px;-webkit-overflow-scrolling:touch}
.pgh{display:flex;align-items:center;gap:6px;padding:8px 4px 4px;font-size:11px;font-weight:800;
  text-transform:uppercase;border-bottom:2px solid;margin-bottom:5px}
.gh1{color:#b52020;border-color:var(--p1b)}.gh2{color:#8a5e00;border-color:var(--p2b)}.gh3{color:#1a5280;border-color:var(--p3b)}
.gc{margin-left:auto;font-size:11px;opacity:.7}
.pcard{background:white;border:1.5px solid var(--border);border-radius:12px;padding:10px 11px;margin-bottom:7px;display:flex;gap:8px;align-items:flex-start}
.pcard.r1{border-left:4px solid var(--p1b)}.pcard.r2{border-left:4px solid var(--p2b)}.pcard.r3{border-left:4px solid var(--p3b)}
.pdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid rgba(0,0,0,.15)}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ptag{font-size:10px;font-weight:800;border-radius:4px;padding:1px 4px;border:1px solid}
.pt1{background:#fff0f0;color:#b52020;border-color:var(--p1b)}
.pt2{background:#fff8e6;color:#8a5e00;border-color:var(--p2b)}
.pt3{background:#f0f8ff;color:#1a5280;border-color:var(--p3b)}
.sbadge{font-size:10px;font-weight:800;border-radius:4px;padding:1px 5px;border:1px solid}
.psub{font-size:11px;color:var(--muted);margin-top:2px}
.psub b{color:var(--red)}
.psub .ok{color:var(--green)}
.pacts{display:flex;flex-direction:column;gap:3px}
.pbtn{background:none;border:1px solid var(--border);border-radius:7px;width:30px;height:30px;
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.pbtn:active{background:var(--bg)}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px}
.ei{font-size:36px;margin-bottom:8px}

/* ROUTE VIEW */
.rv{flex:1;overflow-y:auto;padding:8px 10px 16px;-webkit-overflow-scrolling:touch}
.rsec{background:white;border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.rsec-head{padding:10px 12px;font-size:13px;font-weight:800;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.rpt{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--bg);cursor:default}
.rpt:last-child{border-bottom:none}
.rnum{width:22px;height:22px;border-radius:50%;background:var(--blue);color:white;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rinfo{flex:1}
.rname{font-size:13px;font-weight:700}
.rtime{font-size:11px;color:var(--muted)}
.radd{background:white;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.radd h4{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.daytabs{display:flex;background:white;border-bottom:1px solid var(--border);flex-shrink:0}
.dtab{flex:1;padding:10px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent}
.dtab.on{color:var(--text);border-bottom-color:var(--accent)}
table.tt{width:100%;border-collapse:collapse;font-size:12px}
table.tt th{background:var(--navy);color:white;padding:8px;text-align:left}
table.tt td{padding:8px;border-bottom:1px solid var(--border)}
table.tt tr:last-child td{border-bottom:none}
.leg{display:flex;gap:8px;padding:8px 12px;background:white;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap}
.leg-toggle{flex:1;padding:7px 10px;border-radius:8px;border:2px solid;cursor:pointer;
  font-size:12px;font-weight:800;font-family:inherit;transition:all .15s;text-align:center}

/* BOTTOM NAV */
nav{position:fixed;bottom:0;left:0;right:0;z-index:500;height:var(--NH);
  background:white;border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:700;color:var(--muted);font-family:inherit}
.nb .ni{font-size:20px}
.nb.on{color:var(--blue)}

/* SHEET */
.overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:900;background:white;border-radius:20px 20px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:92vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet.show{transform:translateY(0)}
@media(min-width:768px){
  .sheet{
    top:50%;left:50%;right:auto;bottom:auto;
    width:480px;max-width:90vw;
    border-radius:16px;
    transform:translate(-50%,-50%);
    max-height:85vh;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .2s, visibility .2s;
  }
  .sheet.show{
    opacity:1;
    visibility:visible;
    pointer-events:all;
    transform:translate(-50%,-50%);
  }
}
.sh-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 4px;flex-shrink:0}
.sh-title{font-size:15px;font-weight:800;padding:0 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sh-body{overflow-y:auto;overflow-x:hidden;padding:12px 16px 20px;-webkit-overflow-scrolling:touch}
.sh-body .sf input,.sh-body .sf textarea,.sh-body .sf select{font-size:15px;padding:10px 13px;border-radius:10px}
.sh-body .prow .pr+label{padding:9px 4px;font-size:12px}
#sp1:checked+label{background:#fff0f0;border-color:var(--p1b);color:#b52020}
.sel-btn{flex:1;min-width:0;padding:10px 4px;border-radius:10px;border:2px solid var(--border);
  cursor:pointer;font-size:12px;font-weight:800;text-align:center;
  background:white;color:var(--muted);font-family:inherit;transition:all .15s;
  -webkit-appearance:none;touch-action:manipulation}
.sel-btn.sel-active{background:var(--indigo);border-color:var(--indigo);color:white}
#rtype-group .sel-btn.sel-active[data-val="start"]{background:#2eb87a;border-color:#2eb87a;color:white}
#rtype-group .sel-btn.sel-active[data-val="pass"]{background:var(--indigo);border-color:var(--indigo);color:white}
#rtype-group .sel-btn.sel-active[data-val="end"]{background:var(--red);border-color:var(--red);color:white}
#rday-group .sel-btn.sel-active[data-val="1"]{background:var(--red);border-color:var(--red);color:white}
#rday-group .sel-btn.sel-active[data-val="2"]{background:var(--indigo);border-color:var(--indigo);color:white}
#rday-group .sel-btn.sel-active[data-val="both"]{background:#9c27b0;border-color:#9c27b0;color:white}
#sp2:checked+label{background:#fff8e6;border-color:var(--p2b);color:#8a5e00}
#sp3:checked+label{background:#f0f8ff;border-color:var(--p3b);color:#1a5280}
.sh-body .to+label{padding:9px 5px;font-size:12px}
.sh-body .fr+label{width:36px;height:36px;font-size:13px}
.sh-body .co+label{width:30px;height:30px}
.btn-sheet{width:100%;background:var(--accent);color:var(--navy);border:none;border-radius:12px;
  padding:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px}

/* DESKTOP OVERRIDES */
@media(min-width:768px){
  nav{display:none}
  .wrap{bottom:0;display:flex}
  #map-view{position:relative;flex:1;display:flex!important;flex-direction:column}
  #list-mobile,#route-mobile,#seg-mobile{display:none!important}
}
@media(max-width:767px){
  .sidebar,#route-sidebar{display:none}
  #map-view{display:none;position:absolute;inset:0;flex-direction:column}
  #map-view.on{display:flex}
  #list-mobile{display:none;position:absolute;inset:0;flex-direction:column;background:var(--bg)}
  #list-mobile.on{display:flex}
  #route-mobile{display:none;position:absolute;inset:0;flex-direction:column;background:var(--bg)}
  #route-mobile.on{display:flex}
}
</style>
</head>
<body>
<header>
  <div class="logo">🏮 <b>東郷夏祭り</b> 交通整理</div>
  <!-- ヘッダーボタン -->
  <div class="hbtns">
    <button class="hbtn" id="hbtn-pins" onclick="togglePanel('pins')">📋 配置</button>
    <button class="hbtn" id="hbtn-route" onclick="togglePanel('route')">🛤️ ルート</button>
    <button class="hbtn" id="hbtn-seg" onclick="togglePanel('seg')">🗂️ 区間</button>
    <button class="hbtn" onclick="exportData()" title="データをエクスポート">📤</button>
    <button class="hbtn" onclick="document.getElementById('import-file').click()" title="データをインポート">📥</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
  </div>
  <div class="hstats">
    <div class="hchip c1">🔴<strong id="sc1">0</strong></div>
    <div class="hchip c2">🟡<strong id="sc2">0</strong></div>
    <div class="hchip c3">🔵<strong id="sc3">0</strong></div>
  </div>
  <div style="display:flex;align-items:center;gap:4px;margin-left:6px">
    <div class="syncdot" id="sdot"></div>
    <div class="synctxt" id="stxt">接続中</div>
  </div>
</header>

<div class="wrap">

  <!-- MAP VIEW -->
  <div id="map-view" class="on">
    <div class="mapbar" id="mapbar">
      <div class="mapbar-hint" id="mhint">📍 地図をタップしてピンを追加</div>
      <button class="btn-tog" id="btn-rmode" onclick="toggleRouteMode()">🛤️ ルート</button>
    </div>
    <div id="map" style="flex:1;min-height:0"></div>
    <!-- Pin panel -->
    <div id="pin-panel" onclick="event.stopPropagation()">
      <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 10px"></div>
      <div id="pin-panel-body"></div>
      <div class="pp-actions">
        <button class="pp-btn pp-edit" onclick="event.stopPropagation();doPanelEdit()">✏️ 編集</button>
        <button class="pp-btn pp-del" onclick="event.stopPropagation();doPanelDel()">🗑️ 削除</button>
        <button class="pp-close" onclick="event.stopPropagation();closePinPanel()">✕</button>

<script>
/* ══ FIREBASE ══ */
const FB = {
  apiKey:"AIzaSyCioA2h5OusDmD0YjMGKAcMlNPCzJHrP30",
  authDomain:"tougou-summerfes.firebaseapp.com",
  databaseURL:"https://tougou-summerfes-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"tougou-summerfes",
  storageBucket:"tougou-summerfes.firebasestorage.app",
  messagingSenderId:"1068574588914",
  appId:"1:1068574588914:web:5651ab4a182093eb8ef56b"
};
firebase.initializeApp(FB);
const db = firebase.database();
db.ref('.info/connected').on('value', s=>{
  const ok = s.val();
  document.getElementById('sdot').style.background = ok?'#2eb87a':'#e03c3c';
  document.getElementById('stxt').textContent = ok?'同期中':'オフライン';
});

/* ══ CONST ══ */
const PRIO = {
  1:{l:'🔴 絶対必要',s:'必須',pt:'pt1',gh:'gh1'},
  2:{l:'🟡 できれば',s:'推奨',pt:'pt2',gh:'gh2'},
  3:{l:'🔵 余裕なら',s:'余裕',pt:'pt3',gh:'gh3'}
};
const BANS = {right:'右折禁止',left:'左折禁止',straight:'直進禁止',uright:'右Uターン禁止',uleft:'左Uターン禁止',enter:'進入禁止'};
const ARROW = {北:'↑',南:'↓',東:'→',西:'←'};
const SEG_COLORS = ['#e03c3c','#3d5a99','#2eb87a','#e8a020','#9c27b0','#00897b','#f06292','#5c6bc0'];

/* ══ STATE ══ */
let pins=[], markers={}, activePinId=null, editingPinId=null, pendingLL=null;
let activePanel=null;
let segments=[], prioFilter='all', segFilter='all';
let routeMode=false, pendingRouteLL=null;
let routes={1:[],2:[]}, rPolylines={}, rMarkers={};
let routeVisible={1:true,2:true};
let segVisible={}; // segId -> bool (true=表示)
let activeDay=1;
const isMobile=()=>window.innerWidth<768;

/* ══ MAP ══ */
const map = L.map('map',{zoomControl:true,tap:true}).setView([34.6264,135.6038],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

function iconScale(){
  const z=map.getZoom();
  return Math.max(0.18,Math.min(0.85,(z-12)*0.09+0.20));
}
let colorMode='prio'; // kept for compatibility
const PRIO_COLORS={1:'#e03c3c',2:'#e8a020',3:'#3d82b8'};

function pinColor(pin){
  return PRIO_COLORS[pin.prio||1]||'#e03c3c';
}

function pinSegColor(pin){
  const seg=segments.find(s=>s.id===pin.seg);
  return seg?seg.color:null;
}

function mkIcon(pin){
  const s=iconScale(), r=Math.round(7*s), th=Math.round(5*s), tw=Math.round(4*s), d=r*2, H=d+th;
  const a=pin.face?ARROW[pin.face]:'';
  const afs=Math.max(5,Math.round(7*s));
  const fillColor=pinColor(pin);         // 重要度の色（塗り）
  const segColor=pinSegColor(pin);       // 区間の色（枠）
  // 枠：区間あり→区間色・太め、なし→白
  const borderColor=segColor||'white';
  const borderWidth=segColor?Math.max(2,Math.round(3*s)):Math.max(1,Math.round(2*s));
  // 区間ありの場合は外側にさらに白いリングを追加して見やすく
  const ringHtml=segColor
    ?`<div style="position:absolute;width:${d+borderWidth*2+2}px;height:${d+borderWidth*2+2}px;border-radius:50%;background:${segColor};top:${-(borderWidth+1)}px;left:${-(borderWidth+1)}px;z-index:0"></div>`
    :'';
  return L.divIcon({className:'',
    html:`<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">
      <div style="position:relative;width:${d}px;height:${d}px">
        ${ringHtml}
        <div style="position:absolute;inset:0;border-radius:50%;background:${fillColor};border:${borderWidth}px solid white;display:flex;align-items:center;justify-content:center;color:white;font-size:${afs}px;font-weight:900;line-height:1;z-index:1">${a}</div>
      </div>
      <div style="width:0;height:0;border-left:${tw}px solid transparent;border-right:${tw}px solid transparent;border-top:${th}px solid ${fillColor};margin-top:-1px"></div>
    </div>`,
    iconSize:[d+8,H+4],iconAnchor:[r+4,H+4],popupAnchor:[0,-H-4]
  });
}
map.on('zoomend',()=>{ pins.forEach(p=>{ if(markers[p.id]) markers[p.id].setIcon(mkIcon(p)); }); });

function addMarker(pin){
  const ll=pin.latlng||{lat:pin.lat,lng:pin.lng};
  const m=L.marker(ll,{icon:mkIcon(pin),draggable:true}).addTo(map);
  // 区間非表示なら即非表示
  if(pin.seg && segVisible[pin.seg]===false) m.setOpacity(0).setInteractive?m.setInteractive(false):null;
  m.on('click', e=>{
    L.DomEvent.stopPropagation(e);
    if(isMobile()) mTab('map');
    editPin(pin.id);
  });
  m.on('dragend', e=>{
    const ll=e.target.getLatLng();
    pin.lat=ll.lat; pin.lng=ll.lng; pin.latlng=ll;
    db.ref('pins/'+pin.id).update({lat:ll.lat,lng:ll.lng});
  });
  m.on('dragstart', ()=>closePinPanel());
  markers[pin.id]=m;
}

/* ══ MAP CLICK ══ */
map.on('click', e=>{
  if(routeMode){
    pendingRouteLL=e.latlng;
    setHint(`✅ 地点確定 (${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)})`,true);
    openRouteSheet();
  } else {
    pendingLL=e.latlng;
    updateSegSelects();
    openAddSheet();
  }
});

/* ══ MOBILE TABS ══ */
window.mTab=function(tab){
  const views={map:'map-view',list:'list-mobile',route:'route-mobile',seg:'seg-mobile'};
  Object.entries(views).forEach(([t,vid])=>{
    const v=document.getElementById(vid);
    const n=document.getElementById('nb-'+t);
    if(v) v.style.display=t===tab?'flex':'none';
    if(n) n.classList.toggle('on',t===tab);
  });
  if(tab==='map') setTimeout(()=>map.invalidateSize(),50);
  if(tab==='route') renderRouteContent();
};

/* ══ PANEL TOGGLE ══ */
window.togglePanel=function(tab){
  const panel=document.getElementById('slide-panel');
  const btn=document.getElementById('hbtn-'+tab);
  if(activePanel===tab){
    // 同じボタンを再度押したら閉じる
    panel.classList.remove('show');
    document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
    activePanel=null;
    setTimeout(()=>map.invalidateSize(),50);
    return;
  }
  // 別パネルを開く
  activePanel=tab;
  ['pins','route','seg'].forEach(t=>{
    const pb=document.getElementById('panel-'+t);
    if(pb) pb.style.display=t===tab?'flex':'none';
  });
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  panel.classList.add('show');
  if(tab==='route') renderRouteContent();
  setTimeout(()=>map.invalidateSize(),50);
};

window.savePin=function(){
  if(editingPinId){
    const pin=pins.find(p=>p.id===editingPinId); if(!pin) return;
    const f=collectS(); Object.assign(pin,f);
    if(markers[pin.id]) markers[pin.id].setIcon(mkIcon(pin));
    db.ref('pins/'+pin.id).set({...f,lat:pin.lat||pin.latlng?.lat,lng:pin.lng||pin.latlng?.lng,id:pin.id});
    editingPinId=null; resetS(); closeSheets();
    document.getElementById('sheet-pin-title').textContent='📍 ピンを追加';
    document.getElementById('sheet-save-btn').textContent='📍 このピンを追加する';
    renderPins(); updateStats();
  } else {
    if(!pendingLL) return;
    const f=collectS();
    const id='pin-'+Date.now();
    const pin={id,...f,lat:pendingLL.lat,lng:pendingLL.lng,latlng:pendingLL};
    pins.push(pin); addMarker(pin);
    db.ref('pins/'+id).set({...f,lat:pendingLL.lat,lng:pendingLL.lng,id});
    resetS(); closeSheets(); resetMapBar(); renderPins(); updateStats();
  }
};
window.deskSavePin=function(){
  if(editingPinId){
    const pin=pins.find(p=>p.id===editingPinId); if(!pin) return;
    const f=collectD(); Object.assign(pin,f);
    if(markers[pin.id]) markers[pin.id].setIcon(mkIcon(pin));
    db.ref('pins/'+pin.id).set({...f,lat:pin.lat||pin.latlng?.lat,lng:pin.lng||pin.latlng?.lng,id:pin.id});

    const id='pin-'+Date.now();

    pins.push(pin); addMarker(pin);

    document.getElementById('drelease').value=pin.release||'';
    document.getElementById('dnote').value=pin.note||'';

/* ══ RENDER PINS ══ */
function normBans(b){ return Array.isArray(b)?b:(b?Object.values(b):[]); }
function getPrioFilter(){ return prioFilter; }
function getSegFilter(){ return segFilter; }

window.setPrioF=function(v,el){
  prioFilter=v;
  document.querySelectorAll('#prio-fbar .ftab, #list-mobile .fbar:first-of-type .ftab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  renderPins();
};
window.setSegF=function(v,el){
  segFilter=v;
  document.querySelectorAll('#seg-fbar .ftab, #seg-fbar-m .ftab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  renderPins();
};

function refreshPinVisibility(){
  pins.forEach(pin=>{
    const m=markers[pin.id]; if(!m) return;
    const hidden=pin.seg && segVisible[pin.seg]===false;
    m.setOpacity(hidden?0:1);
    if(m._icon) m._icon.style.pointerEvents=hidden?'none':'auto';
  });
}
function renderPins(){
  let list=pins.slice();
  if(prioFilter!=='all') list=list.filter(p=>p.prio===parseInt(prioFilter));
  if(segFilter!=='all') list=list.filter(p=>p.seg===segFilter);
  const html=buildPinListHtml(list);
  const d=document.getElementById('pin-list-d'); if(d) d.innerHTML=html;
  const m=document.getElementById('pin-list-m'); if(m) m.innerHTML=html;
  refreshPinVisibility();
}
function buildPinListHtml(list){
  if(!list.length) return `<div class="empty"><div class="ei">📭</div>${pins.length?'条件に合うピンがありません':'ピンがありません<br>地図をタップして追加'}</div>`;
  if(prioFilter==='all'){
    let h='';
    [1,2,3].forEach(p=>{
      const g=list.filter(pin=>pin.prio===p); if(!g.length) return;
      h+=`<div class="pgh ${PRIO[p].gh}">${PRIO[p].l}<span class="gc">${g.length}地点</span></div>`;
      h+=g.map(pinCard).join('');
    });
    return h||`<div class="empty"><div class="ei">📭</div>ピンがありません</div>`;
  }
  return list.map(pinCard).join('');
}
function pinCard(pin){
  const pm=PRIO[pin.prio||1];
  const bans=normBans(pin.bans);
  const bs=bans.map(k=>BANS[k]).join('・');
  const fa=pin.face?ARROW[pin.face]+''+pin.face+'向き':'';
  const seg=segments.find(s=>s.id===pin.seg);
  return `<div class="pcard r${pin.prio||1}">
    <div class="pdot" style="background:${pin.color}"></div>
    <div class="pinfo">
      <div class="pname">
        <span class="ptag ${pm.pt}">${pm.s}</span>
        ${seg?`<span class="sbadge" style="background:${seg.color}22;color:${seg.color};border-color:${seg.color}">${seg.name}</span>`:''}
        ${pin.name}
      </div>
      ${pin.lane||fa?`<div class="psub">📍 ${[pin.lane,fa].filter(Boolean).join(' ・ ')}</div>`:''}
      ${bs?`<div class="psub"><b>🚫 ${bs}</b></div>`:''}
      ${pin.ok?`<div class="psub"><span class="ok">🟢 ${pin.ok}</span></div>`:''}
      ${pin.start?`<div class="psub" style="color:#c04000;font-weight:700">🔒 ${pin.start}</div>`:''}
      ${pin.release?`<div class="psub"><span class="ok">🔓 ${pin.release}</span></div>`:''}
      ${pin.note?`<div class="psub">📝 ${pin.note}</div>`:''}
    </div>
    <div class="pacts">
      <button class="pbtn" onclick="editPin('${pin.id}')">✏️</button>
      <button class="pbtn" onclick="locPin('${pin.id}')">🔍</button>
      <button class="pbtn" onclick="delPin('${pin.id}')">🗑️</button>
    </div>
  </div>`;
}
function updateStats(){
  const c={1:0,2:0,3:0}; pins.forEach(p=>c[p.prio||1]++);
  ['1','2','3'].forEach(p=>{
    const d=document.getElementById('sc'+p); if(d) d.textContent=c[p];
    const t=document.getElementById('tc'+p); if(t) t.textContent=c[p];
    const tm=document.getElementById('tc'+p+'m'); if(tm) tm.textContent=c[p];
  });
  const t0=document.getElementById('tc0'); if(t0) t0.textContent=pins.length;
  const t0m=document.getElementById('tc0m'); if(t0m) t0m.textContent=pins.length;
}

/* ══ SEGMENTS ══ */
function updateSegSelects(curVal=''){
  const opts='<option value="">未設定</option>'+segments.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  ['sseg','dseg'].forEach(id=>{ const el=document.getElementById(id); if(el){el.innerHTML=opts;el.value=curVal||'';} });
}
function renderSegs(){
  const items=segments.length
    ? segments.map(s=>`<div style="display:flex;align-items:center;gap:8px;background:white;border:1.5px solid ${s.color}33;border-left:4px solid ${s.color};border-radius:10px;padding:10px 12px">
        <div style="width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
        <div style="flex:1;font-size:13px;font-weight:700">${s.name}</div>
        <button type="button" onclick="delSeg('${s.id}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;padding:2px">✕</button>
      </div>`).join('')
    : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">区間がありません<br>下のフォームから追加してください</div>';
  ['seg-items-d','seg-items-m'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=items; });
  // seg filter bars
  const fbHtml='<button class="ftab'+(segFilter==='all'?' on':'')+'" onclick="setSegF(\'all\',this)">全区間</button>'
    +segments.map(s=>`<button class="ftab${segFilter===s.id?' on':''}" onclick="setSegF('${s.id}',this)"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${s.color};margin-right:3px;vertical-align:middle"></span>${s.name}</button>`).join('');
  ['seg-fbar','seg-fbar-m'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=fbHtml; });
  updateSegSelects();
}
function addSegCore(name){
  if(!name) return;
  const id='seg-'+Date.now(), color=SEG_COLORS[segments.length%SEG_COLORS.length];
  const seg={id,name,color};
  segments.push(seg); db.ref('segments/'+id).set(seg); renderSegs();
}
window.addSeg=function(){ const i=document.getElementById('seg-inp-d'); addSegCore(i.value.trim()); i.value=''; };
window.addSegM=function(){ const i=document.getElementById('seg-inp-m'); addSegCore(i.value.trim()); i.value=''; };
window.delSeg=function(id){
  segments=segments.filter(s=>s.id!==id);
  db.ref('segments/'+id).remove();
  if(segFilter===id){ segFilter='all'; }
  renderSegs(); renderPins();
};

/* ══ ROUTE SYSTEM ══ */
window.setDay=function(d){
  activeDay=d;
  document.querySelectorAll('.dtab').forEach((t,i)=>t.classList.toggle('on',i===d-1));
  renderRouteContent();
};
window.saveRoutePoint=function(){
  const rtype=getSelVal('rtype')||'pass';
  const rday=getSelVal('rday')||'1';
  const rseg=document.getElementById('rseg').value;
  const name=document.getElementById('rn').value.trim();
  const time=document.getElementById('rt').value;
  const note=document.getElementById('rnote').value.trim();

  // 編集モード
  if(editingRpt){
    const {day,id}=editingRpt;
    const pt=routes[day].find(p=>p.id===id);
    if(pt){
      pt.rtype=rtype; pt.rday=rday; pt.rseg=rseg;
      pt.name=name||pt.name; pt.time=time; pt.note=note;
      db.ref('routes/day'+day+'/'+id).update({rtype,rday,rseg,name:pt.name,time,note});
    }
    editingRpt=null;
    ['rn','rnote'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('rt').value='';
    const sbtn=document.getElementById('route-save-btn');
    if(sbtn) sbtn.textContent='📍 この地点を追加して次へ';
    document.getElementById('sheet-route-title').textContent='🛤️ ルート地点を追加';
    closeSheets();
    redrawAllRoutes(); renderRouteContent();
    if(!isMobile()) togglePanel('route');
    else mTab('route');
    return;
  }

  if(!pendingRouteLL) return;
  const typeLabel={start:'🚩 始発',pass:'📍 通過',end:'🏁 終着'}[rtype];
  const id='rpt-'+Date.now();
  const pt={id,
    name:name||(typeLabel+(routes[1].length+routes[2].length+1)),
    time, note, rtype, rday, rseg,
    lat:pendingRouteLL.lat, lng:pendingRouteLL.lng};
  // 登録先を決定（1日目・2日目・両方）
  const days=rday==='both'?[1,2]:[parseInt(rday)];
  days.forEach(d=>{
    const pid=d===days[0]?id:'rpt-'+Date.now()+'-'+d;
    const p={...pt,id:pid};
    routes[d].push(p);
    db.ref('routes/day'+d+'/'+pid).set(p);
  });
  // リセット
  ['rn','rnote'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('rt').value='';
  pendingRouteLL=null;
  redrawAllRoutes();
  renderRouteContent();
  if(rtype==='end'){
    // 終着 → ルートモード終了
    closeSheets();
    routeMode=false;
    document.getElementById('btn-rmode').classList.remove('on');
    resetMapBar();
    if(!isMobile()) togglePanel('route');
    else mTab('route');
  } else {
    // 始発・通過 → シートを閉じて次の地点をタップ待ち
    closeSheets();
    const nextType=rtype==='start'?'pass':'pass';
    document.querySelectorAll('[data-group="rtype"]').forEach(b=>b.classList.remove('sel-active'));
    const nb=document.querySelector(`[data-group="rtype"][data-val="${nextType}"]`);
    if(nb) nb.classList.add('sel-active');
    routeMode=true;
    document.getElementById('btn-rmode').classList.add('on');
    const typeNext={start:'通過地点',pass:'次の通過地点または終着地点'}[rtype];
    setHint(`🛤️ 次は${typeNext}をタップしてください`,true);
    if(!isMobile()){
      // PCはパネルを閉じてマップを全画面に
      const panel=document.getElementById('slide-panel');
      panel.classList.remove('show');
      document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
      activePanel=null;
      setTimeout(()=>map.invalidateSize(),50);
    } else {
      mTab('map');
    }
  }
};
window.delRpt=function(day,id){
  routes[day]=routes[day].filter(p=>p.id!==id);
  db.ref('routes/day'+day+'/'+id).remove();
  redrawAllRoutes(); renderRouteContent();
};

let editingRpt=null;
window.editRpt=function(day,id){
  const pt=routes[day].find(p=>p.id===id); if(!pt) return;
  editingRpt={day,id};
  // フォームに値をセット
  document.getElementById('rn').value=pt.name||'';
  document.getElementById('rt').value=pt.time||'';
  document.getElementById('rnote').value=pt.note||'';
  // 種別セット
  document.querySelectorAll('[data-group="rtype"]').forEach(b=>b.classList.remove('sel-active'));
  const tb=document.querySelector(`[data-group="rtype"][data-val="${pt.rtype||'pass'}"]`);
  if(tb) tb.classList.add('sel-active');
  // 日程セット
  document.querySelectorAll('[data-group="rday"]').forEach(b=>b.classList.remove('sel-active'));
  const db2=document.querySelector(`[data-group="rday"][data-val="${pt.rday||'1'}"]`);
  if(db2) db2.classList.add('sel-active');
  // 区間セット
  const rsel=document.getElementById('rseg');
  if(rsel){
    rsel.innerHTML='<option value="">未設定</option>'+segments.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    rsel.value=pt.rseg||'';
  }
  document.getElementById('sheet-route-title').textContent='✏️ ルート地点を編集';
  openSheet('route');
  // シートが開いた後にボタンを設定
  setTimeout(()=>{
    bindSelBtns();
    const sbtn=document.getElementById('route-save-btn');
    if(sbtn){
      sbtn.textContent='💾 変更を保存する';
      sbtn.onclick=saveRoutePoint;
    }
  },60);
};
window.locRpt=function(day,id){
  const pt=routes[day].find(p=>p.id===id); if(!pt) return;
  if(isMobile()) mTab('map');
  setTimeout(()=>map.setView([pt.lat,pt.lng],17),isMobile()?60:0);
};
window.toggleRouteVis=function(day){
  routeVisible[day]=!routeVisible[day];
  redrawAllRoutes();
  renderRouteContent();
};
window.toggleSegVis=function(segId){
  segVisible[segId]=segVisible[segId]===false?true:false;
  redrawAllRoutes();
  renderPins();
  renderRouteContent();
};

function redrawAllRoutes(){
  // 全ルートを一旦クリア
  Object.values(rPolylines).forEach(p=>{ if(p) map.removeLayer(p); });
  rPolylines={};
  Object.values(rMarkers).forEach(arr=>arr.forEach(m=>map.removeLayer(m)));
  rMarkers={};

  [1,2].forEach(day=>{
    if(!routeVisible[day]) return;
    const pts=routes[day]; if(!pts.length) return;

    // 区間ごとにグループ分け
    const groups={};
    pts.forEach(pt=>{
      const key=pt.rseg||'_noseg';
      if(!groups[key]) groups[key]=[];
      groups[key].push(pt);
    });

    Object.entries(groups).forEach(([segId,gpts])=>{
      // segVisibleが未設定（ロード順序の問題）はtrueとみなす
      if(segId!=='_noseg' && segVisible[segId]===false) return;
      const seg=segments.find(s=>s.id===segId);
      const baseColor=seg?seg.color:(day===1?'#e03c3c':'#3d5a99');
      const dash=day===1?null:'8,6';

      const key=day+'-'+segId;
      rPolylines[key]=L.polyline(gpts.map(p=>[p.lat,p.lng]),{color:baseColor,weight:5,opacity:.8,dashArray:dash}).addTo(map);
      if(!rMarkers[key]) rMarkers[key]=[];

      let seqN=0;
      gpts.forEach(pt=>{
        const isPass=pt.rtype==='pass';
        let iconHtml;
        if(isPass){
          iconHtml=`<div style="background:${baseColor};border:2px solid white;border-radius:50%;width:12px;height:12px;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>`;
        } else {
          seqN++;
          iconHtml=`<div style="background:${baseColor};color:white;border:2px solid white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 2px 4px rgba(0,0,0,.3)">${seqN}</div>`;
        }
        const icon=L.divIcon({className:'',html:iconHtml,iconSize:isPass?[12,12]:[22,22],iconAnchor:isPass?[6,6]:[11,11]});
        const segLabel=seg?`[${seg.name}] `:'';
        rMarkers[key].push(L.marker([pt.lat,pt.lng],{icon}).addTo(map).bindPopup(
          `<b>${segLabel}${isPass?'通過':'地点'+seqN}: ${pt.name}</b>${pt.time?'<br>⏰ '+pt.time:''}${pt.note?'<br>📝 '+pt.note:''}`,
          {maxWidth:200}
        ));
      });
    });
  });
}
function redrawRoute(day){ redrawAllRoutes(); }
function renderRouteContent(){
  const pts=routes[activeDay]; const color=activeDay===1?'#e03c3c':'#3d5a99';
  const typeIcon={start:'🚩',pass:'',end:'🏁'};
  // 始発・終着のみ通し番号を振る
  let seqNum=0;
  const rows=pts.map((pt,i)=>{
    const seg=segments.find(s=>s.id===pt.rseg);
    const segBadge=seg?`<span style="font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px;background:${seg.color}22;color:${seg.color};border:1px solid ${seg.color}">${seg.name}</span>`:'';
    const dayBadge=pt.rday==='both'?'<span style="font-size:10px;background:#f3e5f5;color:#9c27b0;border-radius:4px;padding:1px 5px;font-weight:800">共通</span>':'';
    // 通過は番号なし、始発・終着は番号あり
    let numCell='';
    if(pt.rtype==='pass'){
      numCell=`<span style="color:var(--muted);font-size:12px">📍</span>`;
    } else {
      seqNum++;
      numCell=`<span style="font-weight:800;color:${color}">${typeIcon[pt.rtype]||''}${seqNum}</span>`;
    }
    return `<tr>
    <td style="text-align:center">${numCell}</td>
    <td style="font-weight:700">${pt.name}<br><span style="font-size:11px;font-weight:400;color:var(--muted)">${[segBadge,dayBadge].filter(Boolean).join(' ')}</span></td>
    <td>${pt.time||'—'}</td>
    <td style="color:var(--muted)">${pt.note||''}</td>
    <td style="white-space:nowrap">
      <button class="pbtn" onclick="editRpt(${activeDay},'${pt.id}')">✏️</button>
      <button class="pbtn" onclick="locRpt(${activeDay},'${pt.id}')">🔍</button>
      <button class="pbtn" onclick="delRpt(${activeDay},'${pt.id}');renderRouteContent()">🗑️</button>
    </td>
  </tr>`;}).join('');
  const addBtn=`<div class="radd"><h4>通過地点を追加（日${activeDay}）</h4>
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px">①「地図で位置を選ぶ」を押して地図をタップ　②「地点追加＋」で登録</p>
    <button class="btn-fab" style="width:100%" onclick="startRouteAdd()">🗺️ 地図で位置を選ぶ</button>
  </div>`;
  // 表示切り替えパネル
  const vis1=routeVisible[1]; const vis2=routeVisible[2];
  const dayBtns=`
    <button type="button" class="leg-toggle" onclick="toggleRouteVis(1)" style="background:${vis1?'#e03c3c':'#f0f3f8'};color:${vis1?'white':'#aaa'};border-color:${vis1?'#e03c3c':'#d4dbe8'}">
      <span style="display:inline-block;width:12px;height:3px;border-radius:2px;background:${vis1?'white':'#aaa'};vertical-align:middle;margin-right:4px"></span>1日目
    </button>
    <button type="button" class="leg-toggle" onclick="toggleRouteVis(2)" style="background:${vis2?'#3d5a99':'#f0f3f8'};color:${vis2?'white':'#aaa'};border-color:${vis2?'#3d5a99':'#d4dbe8'}">
      <span style="display:inline-block;width:12px;height:3px;border-radius:2px;background:${vis2?'white':'#aaa'};vertical-align:middle;margin-right:4px"></span>2日目
    </button>`;
  const segBtns=segments.map(seg=>{
    const on=segVisible[seg.id]!==false;
    return `<button type="button" class="leg-toggle" onclick="toggleSegVis('${seg.id}')" style="background:${on?seg.color:'#f0f3f8'};color:${on?'white':'#aaa'};border-color:${on?seg.color:'#d4dbe8'}">
      <span style="display:inline-block;width:12px;height:3px;border-radius:2px;background:${on?'white':'#aaa'};vertical-align:middle;margin-right:4px"></span>${seg.name}
    </button>`;
  }).join('');
  const legHtml=`<div style="background:white;border-radius:10px;border:1px solid var(--border);padding:10px 12px;margin-bottom:8px">
    <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🗓️ 日程</div>
    <div class="leg">${dayBtns}</div>
    ${segments.length?`<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 6px">🛤️ 区間</div><div class="leg">${segBtns}</div>`:''}
  </div>`;
  const tableHtml=pts.length?`<div class="rsec"><div class="rsec-head" style="border-left:4px solid ${color}">⏱️ 日${activeDay} 時刻表 <span style="margin-left:auto;font-size:11px;color:var(--muted)">${pts.length}地点</span></div><div style="overflow-x:auto"><table class="tt"><thead><tr><th>#</th><th>地点名</th><th>通過予定</th><th>備考</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`:`<div class="empty"><div class="ei">🛤️</div>日${activeDay}の通過地点がありません</div>`;
  const content=legHtml+addBtn+tableHtml;
  ['route-content-d','route-content-m'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=content;});
}

window.startRouteAdd=function(){
  // パネルを閉じて地図モードに切り替え
  routeMode=true;
  document.getElementById('btn-rmode').classList.add('on');
  setHint(`🛤️ 日${activeDay}ルート入力中 — 地図をタップして地点を選択`,true);
  // PCはパネルを閉じる、スマホは地図タブへ
  if(isMobile()){
    mTab('map');
  } else {
    // パネルを閉じてマップ全画面に
    const panel=document.getElementById('slide-panel');
    panel.classList.remove('show');
    document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('on'));
    activePanel=null;
    setTimeout(()=>map.invalidateSize(),50);
  }
};

/* ══ FIREBASE LISTENERS ══ */
db.ref('pins').on('value',snap=>{
  pins.forEach(p=>{if(markers[p.id]){map.removeLayer(markers[p.id]);delete markers[p.id];}});
  pins=[];
  const data=snap.val()||{};
  // まず全ピンをpins配列に追加してからマーカーを描画（オフセット計算のため）
  Object.values(data).forEach(d=>{
    const pin={...d,bans:normBans(d.bans),latlng:{lat:d.lat,lng:d.lng}};
    pins.push(pin);
  });
  pins.forEach(pin=>addMarker(pin));
  renderPins(); updateStats();
});
db.ref('segments').on('value',snap=>{
  segments=[];
  const data=snap.val()||{};
  Object.values(data).forEach(s=>segments.push(s));
  segments.sort((a,b)=>a.id.localeCompare(b.id));
  // 新規区間はデフォルト表示
  segments.forEach(s=>{ if(!(s.id in segVisible)) segVisible[s.id]=true; });
  renderSegs(); renderPins();
  pins.forEach(p=>{ if(markers[p.id]) markers[p.id].setIcon(mkIcon(p)); });
  // ルートのロード順問題：segmentsが来たら必ずルートも再描画
  redrawAllRoutes();
  renderRouteContent();
});
db.ref('routes').on('value',snap=>{
  // 古いマーカーをクリア
  Object.values(rPolylines).forEach(p=>{ if(p) map.removeLayer(p); });
  rPolylines={};
  Object.values(rMarkers).forEach(arr=>{ if(Array.isArray(arr)) arr.forEach(m=>map.removeLayer(m)); });
  rMarkers={};
  routes={1:[],2:[]};
  const data=snap.val()||{};
  [1,2].forEach(day=>{
    const dd=data['day'+day]||{};
    Object.values(dd).forEach(pt=>routes[day].push(pt));
    routes[day].sort((a,b)=>a.id.localeCompare(b.id));
  });
  // segmentsロード前の場合は少し待ってから描画
  const draw=()=>{ redrawAllRoutes(); renderRouteContent(); };
  if(segments.length===0) setTimeout(draw,800);
  else draw();
});

/* ══ EXPORT / IMPORT ══ */
window.exportData=function(){
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    pins:pins.map(p=>({...p, latlng:undefined})),
    segments,
    routes
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date();
  const dateStr=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.download=`togo-matsuri-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('データをエクスポートしました ✅');
};

window.importData=function(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version) throw new Error('フォーマットが正しくありません');
      if(!confirm(`データをインポートします。
現在のデータはFirebase上の全データが置き換えられます。
続けますか？`)) return;

      // Firebase を全クリアして書き込み
      const updates={};

      // ピン
      if(data.pins&&data.pins.length){
        data.pins.forEach(p=>{ updates['pins/'+p.id]=p; });
      }
      // 区間
      if(data.segments&&data.segments.length){
        data.segments.forEach(s=>{ updates['segments/'+s.id]=s; });
      }
      // ルート
      if(data.routes){
        [1,2].forEach(day=>{
          const pts=data.routes[day]||[];
          pts.forEach(pt=>{ updates['routes/day'+day+'/'+pt.id]=pt; });
        });
      }

      // 既存データを削除してから書き込み
      Promise.all([
        db.ref('pins').remove(),
        db.ref('segments').remove(),
        db.ref('routes').remove()
      ]).then(()=>{
        if(Object.keys(updates).length){
          return db.ref().update(updates);
        }
      }).then(()=>{
        showToast('インポート完了 ✅');
      }).catch(err=>{
        alert('インポート失敗: '+err.message);
      });
    }catch(err){
      alert('ファイルの読み込みに失敗しました: '+err.message);
    }
    input.value='';
  };
  reader.readAsText(file);
};

/* トースト通知 */
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.opacity='0',2500);
}

/* ══ INIT ══ */
if(isMobile()){
  // 全ビューをいったん非表示にしてからmap表示
  ['map-view','list-mobile','route-mobile','seg-mobile'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const mv=document.getElementById('map-view'); if(mv) mv.style.display='flex';
  setTimeout(()=>map.invalidateSize(),100);
} else {
  setTimeout(()=>map.invalidateSize(),100);
}
